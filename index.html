<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Unicorn Land — Waverly's Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #000;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ============================================================================
// GAME STATE
// ============================================================================

const game = {
  fruity: {
    x: canvas.width * 0.5,
    y: canvas.height * 0.35,
    targetX: canvas.width * 0.5,
    targetY: canvas.height * 0.35,
    vx: 0,
    vy: 0,
    size: 60,
    wingFlap: 0,
    idleTime: 0,
    magicTimer: 0,
  },
  raindrops: [],
  particles: [],
  sessionId: generateUUID(),
};

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : r & 0x3 | 0x8).toString(16);
  });
}

// ============================================================================
// INITIALIZE RAIN
// ============================================================================

for (let i = 0; i < 60; i++) {
  game.raindrops.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    speed: 80 + Math.random() * 60,
    angle: 0.2,
    width: 2,
    height: 10,
    opacity: 0.3 + Math.random() * 0.2,
  });
}

// ============================================================================
// DRAW BACKGROUND GRADIENT & RAIN
// ============================================================================

function drawBackground() {
  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#FFD6A5'); // Peachy pink
  grad.addColorStop(1, '#C8B6FF'); // Lavender
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawRain() {
  game.raindrops.forEach(drop => {
    ctx.globalAlpha = drop.opacity;
    ctx.fillStyle = '#E0E0FF';
    ctx.fillRect(drop.x, drop.y, drop.width, drop.height);

    // Update position
    drop.y += drop.speed * (1 / 60);
    drop.x += drop.speed * drop.angle * (1 / 60);

    // Wrap
    if (drop.y > canvas.height) {
      drop.y = -drop.height;
      drop.x = Math.random() * canvas.width;
    }
    if (drop.x < 0) drop.x = canvas.width;
    if (drop.x > canvas.width) drop.x = 0;
  });
  ctx.globalAlpha = 1;
}

// ============================================================================
// DRAW WORLD
// ============================================================================

function drawWorld() {
  const worldY = canvas.height * 0.65;

  // Hill
  ctx.fillStyle = '#808080';
  ctx.beginPath();
  ctx.moveTo(0, worldY + 40);
  ctx.lineTo(canvas.width * 0.3, worldY - 60);
  ctx.lineTo(canvas.width, worldY + 40);
  ctx.fill();

  // House 1
  ctx.fillStyle = '#999999';
  ctx.fillRect(60, worldY - 70, 90, 70);
  ctx.fillStyle = '#808080';
  ctx.beginPath();
  ctx.moveTo(60, worldY - 70);
  ctx.lineTo(150, worldY - 70);
  ctx.lineTo(105, worldY - 95);
  ctx.fill();

  // House 2
  ctx.fillStyle = '#999999';
  ctx.fillRect(canvas.width - 140, worldY - 65, 80, 65);
  ctx.fillStyle = '#808080';
  ctx.beginPath();
  ctx.moveTo(canvas.width - 140, worldY - 65);
  ctx.lineTo(canvas.width - 60, worldY - 65);
  ctx.lineTo(canvas.width - 100, worldY - 88);
  ctx.fill();

  // Tree
  ctx.fillStyle = '#666666';
  ctx.fillRect(canvas.width * 0.5 - 5, worldY - 50, 10, 50);
  ctx.fillStyle = '#808080';
  ctx.beginPath();
  ctx.arc(canvas.width * 0.5, worldY - 70, 25, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================================
// DRAW FRUITY
// ============================================================================

function drawFruity() {
  const f = game.fruity;

  // Glow
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(f.x, f.y, 60, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Wing flap animation (VERY subtle - barely noticeable)
  f.wingFlap += 0.008;
  const wingOffset = Math.sin(f.wingFlap) * 1;

  // Body (white/cream)
  ctx.fillStyle = '#FFFACD';
  ctx.beginPath();
  ctx.ellipse(f.x + 5, f.y + 15, 22, 30, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head (larger, rounder)
  ctx.fillStyle = '#FFFACD';
  ctx.beginPath();
  ctx.arc(f.x - 12, f.y - 25, 26, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#FFB6E1';
  ctx.beginPath();
  ctx.ellipse(f.x - 25, f.y - 45, 8, 14, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(f.x, f.y - 48, 8, 14, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Horn
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(f.x - 12, f.y - 52);
  ctx.lineTo(f.x - 10, f.y - 75);
  ctx.stroke();

  // Mane (flowing)
  ctx.strokeStyle = '#FFB6E1';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(f.x - 8, f.y - 48);
  ctx.quadraticCurveTo(f.x - 5, f.y - 40, f.x + 5, f.y - 35);
  ctx.stroke();

  // Eye
  ctx.fillStyle = '#333333';
  ctx.beginPath();
  ctx.arc(f.x - 18, f.y - 28, 3, 0, Math.PI * 2);
  ctx.fill();

  // Wings (subtle gold shimmer)
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(f.x - 30 + wingOffset, f.y + 5, 16, 22, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(f.x + 40 - wingOffset, f.y + 5, 16, 22, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Front legs
  ctx.strokeStyle = '#FFFACD';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(f.x - 8, f.y + 40);
  ctx.lineTo(f.x - 8, f.y + 62);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(f.x + 18, f.y + 40);
  ctx.lineTo(f.x + 18, f.y + 62);
  ctx.stroke();

  // Hooves
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(f.x - 11, f.y + 62, 6, 4);
  ctx.fillRect(f.x + 15, f.y + 62, 6, 4);

  // Tail (golden, flowing)
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.moveTo(f.x + 25, f.y + 25);
  ctx.quadraticCurveTo(f.x + 50, f.y + 35, f.x + 45, f.y + 65);
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ============================================================================
// DRAW PARTICLES
// ============================================================================

function drawParticles() {
  game.particles = game.particles.filter(p => {
    p.life -= 1 / 60;
    p.x += p.vx * (1 / 60);
    p.y += p.vy * (1 / 60);

    if (p.life > 0) {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.font = p.size + 'px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, p.x, p.y);
      return true;
    }
    return false;
  });
  ctx.globalAlpha = 1;
}

// ============================================================================
// UPDATE FRUITY
// ============================================================================

function updateFruity() {
  const f = game.fruity;
  const dx = f.targetX - f.x;
  const dy = f.targetY - f.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > 5) {
    f.vx = (dx / dist) * 300;
    f.vy = (dy / dist) * 300;
    f.idleTime = 0;
  } else {
    f.vx *= 0.9;
    f.vy *= 0.9;
    f.idleTime += 1 / 60;
  }

  f.x += f.vx * (1 / 60);
  f.y += f.vy * (1 / 60);

  // Gentle bobbing when idle
  if (f.idleTime > 0.2) {
    const bob = Math.sin(f.idleTime * 2) * 8;
    f.y = f.targetY + bob;
  }

  // Keep in bounds
  f.x = Math.max(50, Math.min(canvas.width - 50, f.x));
  f.y = Math.max(50, Math.min(canvas.height - 50, f.y));

  // Passive magic
  f.magicTimer += 1 / 60;
  if (f.magicTimer > 5) {
    f.magicTimer = 0;
    if (Math.random() < 0.5) {
      // Cupcake
      game.particles.push({
        x: f.x + Math.random() * 40 - 20,
        y: f.y + 25,
        vx: 0,
        vy: 100,
        emoji: '🧁',
        size: 20,
        life: 5,
        maxLife: 5,
      });
    } else {
      // Rainbow
      for (let i = 0; i < 2; i++) {
        game.particles.push({
          x: f.x - 25 + Math.random() * 20 - 10,
          y: f.y + Math.random() * 20 - 10,
          vx: -60 - Math.random() * 30,
          vy: -30 - Math.random() * 20,
          emoji: '🌈',
          size: 18,
          life: 1.5,
          maxLife: 1.5,
        });
      }
    }
  }
}

// ============================================================================
// INPUT
// ============================================================================

let hintAlpha = 1;
let showHint = true;

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);

  game.fruity.targetX = x;
  game.fruity.targetY = y;
  showHint = false;

  // Sparkle trail
  for (let i = 0; i < 6; i++) {
    game.particles.push({
      x: game.fruity.x + Math.random() * 30 - 15,
      y: game.fruity.y + Math.random() * 30 - 15,
      vx: (Math.random() - 0.5) * 150,
      vy: (Math.random() - 0.5) * 150,
      emoji: '✨',
      size: 16,
      life: 0.4,
      maxLife: 0.4,
    });
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const y = (touch.clientY - rect.top) * (canvas.height / rect.height);

  game.fruity.targetX = x;
  game.fruity.targetY = y;
  showHint = false;

  for (let i = 0; i < 6; i++) {
    game.particles.push({
      x: game.fruity.x + Math.random() * 30 - 15,
      y: game.fruity.y + Math.random() * 30 - 15,
      vx: (Math.random() - 0.5) * 150,
      vy: (Math.random() - 0.5) * 150,
      emoji: '✨',
      size: 16,
      life: 0.4,
      maxLife: 0.4,
    });
  }
});

// ============================================================================
// MAIN LOOP
// ============================================================================

function draw() {
  drawBackground();
  drawRain();
  drawWorld();
  updateFruity();
  drawFruity();
  drawParticles();

  // Hint
  if (showHint) {
    hintAlpha -= 0.005;
    ctx.globalAlpha = Math.max(0, hintAlpha);
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#9966CC';
    ctx.fillText('✨ Tap to help Fruity fly ✨', canvas.width * 0.5, canvas.height * 0.12);
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(draw);
}

draw();

console.log('[UNICORN LAND] Started. Session:', game.sessionId);
</script>
</body>
</html>
